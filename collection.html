<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection — Brandy</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-13JN7BHRMC"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-13JN7BHRMC');</script>
  <script src="brandy-analytics.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #EDE5D0;
      --surface:     #E5DCC6;
      --card:        #F5F0E8;
      --border:      rgba(59,74,46,0.1);
      --border-hover:rgba(59,74,46,0.22);
      --forest:      #3B4A2E;
      --forest-deep: #2A3620;
      --golden:      #8B6419;
      --natural:     #C4B896;
      --cream:       #EDE5D0;
      --muted:       rgba(59,74,46,0.5);
      --ink:         #1C2318;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(237,229,208,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 48px;
    }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .nav-back {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); text-decoration: none;
      transition: color 0.2s ease;
    }
    .nav-back:hover { color: var(--forest); }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: transparent; color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s ease, color 0.2s ease, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .icon-btn:hover { background: rgba(59,74,46,0.07); color: var(--forest); transform: scale(1.1); }

    /* HEADER */
    .collection-header {
      max-width: 1200px; margin: 0 auto;
      padding: 64px 48px 40px;
      border-bottom: 1px solid var(--border);
    }
    .collection-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--golden); margin-bottom: 14px;
    }
    .collection-title {
      font-size: clamp(40px, 6vw, 72px); font-weight: 500;
      letter-spacing: -0.03em; line-height: 1.0;
      color: var(--ink); margin-bottom: 14px;
    }
    .collection-count {
      font-size: 12px; color: var(--muted); letter-spacing: 0.06em;
    }

    /* PRODUCT GRID */
    .products-grid {
      max-width: 1200px; margin: 0 auto;
      padding: 48px 48px 96px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .product-card {
      background: var(--card); border: 1px solid var(--border);
      overflow: hidden; cursor: pointer;
      transition: border-color 0.3s ease, transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.3s ease;
    }
    .product-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-4px);
      box-shadow: 0 12px 36px rgba(59,74,46,0.1);
    }
    .product-img { position: relative; aspect-ratio: 2/3; overflow: hidden; }
    .product-img img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.55s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .product-card:hover .product-img img { transform: scale(1.05); }
    .product-img-overlay { display: none; }
    .quick-add-btn {
      position: absolute; bottom: 12px; left: 50%;
      transform: translateX(-50%) translateY(8px); opacity: 0;
      white-space: nowrap;
      font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      background: var(--cream); color: var(--ink);
      padding: 9px 20px; border: none; cursor: pointer;
      transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.34,1.56,0.64,1), background 0.2s ease;
    }
    .product-card:hover .quick-add-btn { opacity: 1; transform: translateX(-50%) translateY(0); }
    .quick-add-btn:hover { background: #fff; }
    .new-badge {
      position: absolute; top: 10px; left: 10px;
      background: var(--golden); color: var(--cream);
      font-size: 8px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 4px 8px;
    }
    .wish-btn {
      position: absolute; top: 10px; right: 10px;
      width: 32px; height: 32px; border-radius: 50%;
      border: none; cursor: pointer;
      background: rgba(245,240,232,0.9); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); transition: background 0.2s, color 0.2s, transform 0.2s;
      z-index: 2;
    }
    .wish-btn:hover { background: #fff; color: #C0392B; transform: scale(1.1); }
    .wish-btn.saved { color: #C0392B; background: #fff; }
    .wish-btn.saved svg { fill: #C0392B; }
    .product-info { padding: 16px 18px 20px; }
    .swatch-dot {
      width: 20px; height: 20px; border-radius: 50%; cursor: pointer; display: inline-block;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .swatch-dot:hover { transform: scale(1.3); }
    .card-size-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .card-size-chip { padding: 3px 9px; border: 1px solid rgba(59,74,46,0.25); border-radius: 4px; font-size: 10px; font-weight: 600; color: var(--ink); cursor: pointer; letter-spacing: 0.06em; transition: all 0.15s; user-select: none; }
    .card-size-chip:hover { border-color: var(--forest); color: var(--forest); }
    .card-size-chip.active { background: var(--forest); color: #F5F0E8; border-color: var(--forest); }

    /* TOAST */
    @keyframes toast-in {
      0%   { opacity:0; transform:translateY(20px) scale(0.95); }
      60%  { transform:translateY(-4px) scale(1.02); }
      100% { opacity:1; transform:translateY(0) scale(1); }
    }
    @keyframes toast-out {
      from { opacity:1; transform:translateY(0) scale(1); }
      to   { opacity:0; transform:translateY(16px) scale(0.95); }
    }
    @keyframes check-draw {
      from { stroke-dashoffset: 40; }
      to   { stroke-dashoffset: 0; }
    }
    .toast {
      position: fixed; bottom: 32px; right: 32px; z-index: 9999;
      display: flex; align-items: center; gap: 14px;
      background: var(--forest); color: var(--cream);
      padding: 16px 22px;
      box-shadow: 0 12px 40px rgba(59,74,46,0.35), 0 4px 12px rgba(59,74,46,0.2);
      border-left: 3px solid var(--golden);
      min-width: 260px; pointer-events: none;
    }
    .toast.in  { animation: toast-in  0.45s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    .toast.out { animation: toast-out 0.35s ease-in forwards; }
    .toast-check { width: 28px; height: 28px; border-radius: 50%; background: var(--golden); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .toast-check svg polyline { stroke-dasharray: 40; stroke-dashoffset: 40; animation: check-draw 0.4s 0.15s ease forwards; }
    .toast-title { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; color: var(--cream); }
    .toast-sub   { font-size: 11px; font-weight: 300; color: rgba(237,229,208,0.7); }

    @media (max-width: 900px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); padding: 32px 24px 64px; }
      .collection-header { padding: 40px 24px 32px; }
      nav { padding: 12px 24px; }
    }
    @media (max-width: 480px) {
      .products-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <a href="index3.html#collections" class="nav-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back to Shop
      </a>
      <a href="index3.html"><img src="brandassets/logo1 (2).png" alt="Brandy" id="nav-logo"></a>
      <div style="display:flex;align-items:center;gap:4px;">
        <div style="position:relative;">
          <button class="icon-btn" aria-label="Wishlist" onclick="openWishlist()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
          <span id="wish-badge" style="position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:#C0392B;display:none;"></span>
        </div>
        <a href="cart.html" class="icon-btn" style="position:relative;" aria-label="Cart">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span style="position:absolute;top:8px;right:8px;width:6px;height:6px;border-radius:50%;background:var(--golden);"></span>
        </a>
      </div>
    </div>
  </nav>

  <!-- COLLECTION HEADER -->
  <div class="collection-header">
    <p class="collection-label">Collection</p>
    <h1 class="collection-title" id="collection-title">—</h1>
    <p class="collection-count" id="collection-count"></p>
  </div>

  <!-- PRODUCTS GRID -->
  <div class="products-grid" id="products-grid"></div>

  <!-- WISHLIST SIDEBAR -->
  <div id="wish-overlay" onclick="if(event.target===this)closeWishlist()" style="position:fixed;inset:0;z-index:8000;background:rgba(28,35,24,0.4);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity 0.25s;">
    <div id="wish-panel" style="position:fixed;top:0;right:0;height:100vh;width:380px;max-width:95vw;background:var(--card);z-index:8001;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);box-shadow:-8px 0 40px rgba(0,0,0,0.15);">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:22px 24px;border-bottom:1px solid var(--border);">
        <div><h2 style="font-size:16px;font-weight:600;color:var(--ink);">My Wishlist</h2><div id="wish-count-label" style="font-size:11px;color:var(--muted);margin-top:2px;"></div></div>
        <button onclick="closeWishlist()" style="width:32px;height:32px;border-radius:50%;border:none;background:transparent;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="wish-items" style="flex:1;overflow-y:auto;padding:16px 24px;"></div>
    </div>
  </div>

  <script>
    const PRODUCTS_DATA = {
      'Classic': [
        { id: 'product4', name: 'Ralph Lauren Polo Shirt', price: 750, category: 'Classic', href: 'product4.html',
          defaultImg: 'polo-blue.png', defaultColor: 'Blue',
          sizes: ['S', 'M', 'L', 'XL'],
          colors: [
            { name: 'Blue',  img: 'polo-blue.png',  hex: '#3A6EA5' },
            { name: 'Navy',  img: 'polo-navy.png',  hex: '#1F3560' },
            { name: 'Black', img: 'polo-black.png', hex: '#1C2318' }
          ]
        }
      ],
      'Streetwear': [
        { id: 'product1', name: 'Off-White T-Shirt', price: 700, category: 'Streetwear', href: 'product1.html',
          defaultImg: '5058ff11-1b2c-44ef-80f0-2daa8184b894.png', defaultColor: 'White',
          colorSizes: { 'White': ['L'], 'Black': ['M'] },
          colors: [
            { name: 'White', img: '5058ff11-1b2c-44ef-80f0-2daa8184b894.png', hex: '#F5F5F0', border: true },
            { name: 'Black', img: '5E147019-5064-4F55-974F-1CA8AE14798E.png', hex: '#1C2318' }
          ]
        },
        { id: 'product2', name: 'Mastermind T-Shirt', price: 700, category: 'Streetwear', href: 'product2.html',
          defaultImg: 'fe30f63e-57d1-4fd3-80a3-4dc6d8d043ae.png', defaultColor: 'Black',
          colorSizes: { 'Black': ['M'], 'White': ['L'] },
          colors: [
            { name: 'Black', img: 'fe30f63e-57d1-4fd3-80a3-4dc6d8d043ae.png', hex: '#1C2318' },
            { name: 'White', img: 'mastermind-white.png', hex: '#F5F5F0', border: true }
          ]
        },
        { id: 'product3', name: 'Zara Short', price: 800, category: 'Streetwear', href: 'product3.html',
          defaultImg: 'cargo-shorts-black.png', defaultColor: 'Black',
          sizes: ['S', 'M', 'L', 'XL'],
          colors: [
            { name: 'Black', img: 'cargo-shorts-black.png', hex: '#1C2318' }
          ]
        }
      ]
    };

    const params  = new URLSearchParams(window.location.search);
    const cat     = params.get('cat') || 'Classic';
    const products = PRODUCTS_DATA[cat] || [];

    document.getElementById('collection-title').textContent = cat;
    document.getElementById('collection-count').textContent = products.length + ' ' + (products.length === 1 ? 'item' : 'items');
    document.title = cat + ' Collection — Brandy';

    // ── CART ──
    function getCart() { try { return JSON.parse(localStorage.getItem('brandy_cart')) || []; } catch { return []; } }
    function saveCart(c) { localStorage.setItem('brandy_cart', JSON.stringify(c)); }

    function showToast(name, color, size) {
      let toast = document.getElementById('brandy-toast');
      if (toast) { clearTimeout(window._toastTimer); toast.remove(); }
      toast = document.createElement('div');
      toast.id = 'brandy-toast';
      toast.className = 'toast in';
      toast.innerHTML = `
        <div class="toast-check">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div>
          <p class="toast-title">Added to Cart</p>
          <p class="toast-sub">${name} · ${color}${size ? ' · ' + size : ''}</p>
        </div>`;
      document.body.appendChild(toast);
      window._toastTimer = setTimeout(() => {
        toast.className = 'toast out';
        setTimeout(() => toast.remove(), 400);
      }, 2800);
    }

    function quickAddProduct(id, name, price, e) {
      e && e.stopPropagation();
      const imgEl   = document.getElementById('img-' + id);
      const color   = imgEl.dataset.color;
      const img     = imgEl.dataset.img;
      const sizeEl  = document.querySelector(`#sizes-${id} .card-size-chip.active`);
      const size    = sizeEl ? sizeEl.textContent : 'M';
      const cart    = getCart();
      const existing = cart.find(i => i.id === id && i.color === color && i.size === size);
      if (existing) { existing.qty += 1; }
      else { cart.push({ id, name, price, image: img, color, size, qty: 1 }); }
      saveCart(cart);
      showToast(name, color, size);
    }

    function selectSwatch(id, el, img, colorName) {
      el.closest('.swatch-row').querySelectorAll('.swatch-dot').forEach(s => s.style.outline = 'none');
      el.style.outline = '2px solid var(--forest)';
      el.style.outlineOffset = '2px';
      const imgEl = document.getElementById('img-' + id);
      imgEl.src = img;
      imgEl.dataset.color = colorName;
      imgEl.dataset.img   = img;
      // Refresh size chips for color-specific sizes
      const sizesEl = document.getElementById('sizes-' + id);
      if (sizesEl) {
        const colorSizes = JSON.parse(sizesEl.dataset.colorSizes || '{}');
        const newSizes = colorSizes[colorName];
        if (newSizes) {
          sizesEl.innerHTML = newSizes.map((s, i) =>
            `<span class="card-size-chip${i===0?' active':''}" onclick="event.stopPropagation();this.closest('.card-size-row').querySelectorAll('.card-size-chip').forEach(c=>c.classList.remove('active'));this.classList.add('active')">${s}</span>`
          ).join('');
        }
      }
    }

    // ── RENDER ──
    const grid = document.getElementById('products-grid');
    grid.innerHTML = products.map(p => {
      const swatches = p.colors.map(c => {
        const active  = c.name === p.defaultColor;
        const border  = c.border ? ';box-shadow:inset 0 0 0 1px rgba(59,74,46,0.2)' : '';
        const outline = active  ? ';outline:2px solid var(--forest);outline-offset:2px' : '';
        return `<div class="swatch-dot" style="background:${c.hex}${border}${outline}" title="${c.name}"
          onclick="event.stopPropagation();selectSwatch('${p.id}',this,'${c.img}','${c.name}')"></div>`;
      }).join('');

      const initSizes = p.colorSizes ? (p.colorSizes[p.defaultColor] || []) : (p.sizes || []);
      const sizeChips = initSizes.map((s, i) =>
        `<span class="card-size-chip${i===0?' active':''}" onclick="event.stopPropagation();this.closest('.card-size-row').querySelectorAll('.card-size-chip').forEach(c=>c.classList.remove('active'));this.classList.add('active')">${s}</span>`
      ).join('');
      const colorSizesAttr = p.colorSizes ? JSON.stringify(p.colorSizes).replace(/'/g, '&#39;') : '{}';

      return `
        <div class="product-card" onclick="if(!event.target.closest('.swatch-dot,.quick-add-btn,.wish-btn,.card-size-chip')){sessionStorage.setItem('brandy_back_url',window.location.href);const _ci=document.getElementById('img-${p.id}');if(_ci)sessionStorage.setItem('brandy_color_${p.id}',_ci.dataset.color);window.location='${p.href}';}">
          <div class="product-img">
            <img src="${p.defaultImg}" alt="${p.name}" id="img-${p.id}" data-color="${p.defaultColor}" data-img="${p.defaultImg}">
            <div class="product-img-overlay"></div>
            <button class="quick-add-btn" onclick="quickAddProduct('${p.id}','${p.name}',${p.price},event)">Add to Cart</button>
            <div class="new-badge">New</div>
            <button class="wish-btn" data-id="${p.id}" aria-label="Save to wishlist"
              onclick="event.stopPropagation();toggleWishlist('${p.id}','${p.name}','${p.category}','${p.price} EGP','${p.defaultImg}','${p.href}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </button>
          </div>
          <div class="product-info">
            <p style="font-size:9px;color:var(--ink);opacity:0.75;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">${p.category}</p>
            <p style="font-size:17px;font-weight:600;color:var(--ink);margin-bottom:8px;">${p.name}</p>
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <span style="font-size:14px;font-weight:600;color:var(--golden);">${p.price} EGP</span>
              <div class="swatch-row" style="display:flex;gap:8px;">${swatches}</div>
            </div>
            <div class="card-size-row" id="sizes-${p.id}" data-color-sizes='${colorSizesAttr}'>${sizeChips}</div>
          </div>
        </div>`;
    }).join('');

    // ── LOGO ──
    function removeWhiteBg(img, t = 238) {
      try {
        const c = document.createElement('canvas');
        c.width = img.naturalWidth; c.height = img.naturalHeight;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const d = ctx.getImageData(0, 0, c.width, c.height);
        for (let i = 0; i < d.data.length; i += 4) {
          if (d.data[i] >= t && d.data[i+1] >= t && d.data[i+2] >= t) d.data[i+3] = 0;
        }
        ctx.putImageData(d, 0, 0);
        img.src = c.toDataURL('image/png');
      } catch(e) {}
    }
    const logo = document.getElementById('nav-logo');
    if (logo) {
      logo.style.height = '72px';
      if (logo.complete && logo.naturalWidth) removeWhiteBg(logo);
      else logo.addEventListener('load', () => removeWhiteBg(logo));
    }

    // ── WISHLIST ──
    const WISH_KEY = 'brandy_wishlist';
    function getWishlist() { try { return JSON.parse(localStorage.getItem(WISH_KEY)) || []; } catch { return []; } }
    function saveWishlist(w) { localStorage.setItem(WISH_KEY, JSON.stringify(w)); }

    function toggleWishlist(id, name, category, price, img, href) {
      let w = getWishlist();
      const idx = w.findIndex(i => i.id === id);
      if (idx > -1) { w.splice(idx, 1); } else { w.push({ id, name, category, price, img, href }); }
      saveWishlist(w);
      updateWishBadge();
      updateCardHearts();
    }

    function updateWishBadge() {
      const badge = document.getElementById('wish-badge');
      if (badge) badge.style.display = getWishlist().length > 0 ? 'block' : 'none';
    }

    function updateCardHearts() {
      const w = getWishlist();
      document.querySelectorAll('.wish-btn[data-id]').forEach(btn => {
        const saved = w.some(i => i.id === btn.dataset.id);
        btn.classList.toggle('saved', saved);
      });
    }

    function openWishlist() {
      renderWishlistPanel();
      const ov = document.getElementById('wish-overlay');
      const pn = document.getElementById('wish-panel');
      ov.style.opacity = '1'; ov.style.pointerEvents = 'all';
      pn.style.transform = 'translateX(0)';
      document.body.style.overflow = 'hidden';
    }

    function closeWishlist() {
      const ov = document.getElementById('wish-overlay');
      const pn = document.getElementById('wish-panel');
      ov.style.opacity = '0'; ov.style.pointerEvents = 'none';
      pn.style.transform = 'translateX(100%)';
      document.body.style.overflow = '';
    }

    function removeFromWishlist(id) {
      saveWishlist(getWishlist().filter(i => i.id !== id));
      updateWishBadge();
      updateCardHearts();
      renderWishlistPanel();
    }

    function renderWishlistPanel() {
      const w = getWishlist();
      document.getElementById('wish-count-label').textContent = w.length === 0 ? 'No saved items' : `${w.length} item${w.length > 1 ? 's' : ''} saved`;
      const el = document.getElementById('wish-items');
      if (w.length === 0) { el.innerHTML = '<div style="text-align:center;padding:60px 24px;color:var(--muted);font-size:14px;">Nothing saved yet.</div>'; return; }
      el.innerHTML = w.map(item => `
        <div style="display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);align-items:center;">
          <img src="${item.img}" style="width:64px;height:64px;border-radius:8px;object-fit:cover;background:var(--surface);flex-shrink:0;" alt="${item.name}">
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px;">${item.name}</div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;">${item.category}</div>
            ${item.price ? `<div style="font-size:13px;font-weight:600;color:var(--golden);">${item.price}</div>` : ''}
            <div style="display:flex;gap:6px;margin-top:8px;">
              <button onclick="window.location.href='${item.href}'" style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 12px;background:var(--forest);color:var(--cream);border:none;border-radius:5px;cursor:pointer;">View Product</button>
              <button onclick="removeFromWishlist('${item.id}')" style="font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:6px 10px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:5px;cursor:pointer;">Remove</button>
            </div>
          </div>
        </div>`).join('');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeWishlist(); });
    updateWishBadge();
    updateCardHearts();
  </script>
</body>
</html>
